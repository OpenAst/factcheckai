<!DOCTYPE html>
<html>

<head>
  <title>SRT Fact-Check AI</title>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f7f6;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
      color: #2c3e50;
    }

    .content-box {
      width: 100%;
      box-sizing: border-box;
      background: white;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
      margin-bottom: 15px;
      min-height: 80px;
      max-height: 200px;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      font-family: inherit;
    }

    #result {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    button {
      width: 100%;
      background: #3498db;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover {
      background: #2980b9;
    }

    button:disabled {
      background: #bdc3c7;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      margin-left: 5px;
      vertical-align: middle;
    }

    .badge-cached {
      background: #e67e22;
      color: white;
    }

    .copy-btn {
      margin-top: 10px;
      background: #27ae60;
      display: none;
    }

    .copy-btn:hover {
      background: #219150;
    }

    .retry-btn {
      margin-top: 5px;
      background: #7f8c8d;
      padding: 5px;
      font-size: 11px;
    }

    .retry-btn:hover {
      background: #95a5a6;
    }

    canvas {
      display: none;
    }

    .loading {
      text-align: center;
      display: none;
      margin-top: 10px;
    }

    .loading-dots:after {
      content: '.';
      animation: dots 1s steps(5, end) infinite;
    }

    .report-link {
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }

    .report-link:hover {
      text-decoration: underline;
    }

    @keyframes dots {

      0%,
      20% {
        content: '.';
      }

      40% {
        content: '..';
      }

      60% {
        content: '...';
      }

      80%,
      100% {
        content: '';
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h2 id="title">SRT Fact-Check AI</h2>
    <span id="cache-badge" class="badge badge-cached" style="display: none;">Cached</span>
  </div>

  <textarea id="detected-text" class="content-box">
    Detecting content...
  </textarea>
  <div style="display: flex; justify-content: flex-end; margin-top: -10px; margin-bottom: 10px;">
    <button id="retry-btn" class="retry-btn" style="width: auto;">🔄 Retry Detection</button>
  </div>

  <button id="check-btn" disabled>Fact Check Claim</button>

  <div id="loading" class="loading">
    Analyzing claim<span class="loading-dots"></span>
  </div>

  <div id="result"></div>
  <button id="copy-btn" class="copy-btn">Copy Report</button>

  <script src="popup.js"></script>
</body>

</html>
