<!DOCTYPE html>
<html>

<head>
  <title>SRT Fact-Check AI</title>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f7f6;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
      color: #2c3e50;
    }

    .content-box {
      width: 100%;
      box-sizing: border-box;
      background: white;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
      margin-bottom: 15px;
      min-height: 80px;
      max-height: 200px;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      font-family: inherit;
    }

    #result {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    button {
      width: 100%;
      background: #3498db;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover {
      background: #2980b9;
    }

    button:disabled {
      background: #bdc3c7;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      margin-left: 5px;
      vertical-align: middle;
    }

    .badge-cached {
      background: #e67e22;
      color: white;
    }

    .copy-btn {
      margin-top: 10px;
      background: #27ae60;
      display: none;
    }

    .copy-btn:hover {
      background: #219150;
    }

    .retry-btn {
      margin-top: 5px;
      background: #7f8c8d;
      padding: 5px;
      font-size: 11px;
    }

    .retry-btn:hover {
      background: #95a5a6;
    }

    canvas {
      display: none;
    }

    .loading {
      text-align: center;
      display: none;
      margin-top: 10px;
    }

    .loading-dots:after {
      content: '.';
      animation: dots 1s steps(5, end) infinite;
    }

    .report-link {
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }

    .report-link:hover {
      text-decoration: underline;
    }

    .save-source-btn {
      margin-top: 6px;
      width: auto;
      background: #16a085;
      padding: 6px 10px;
      font-size: 11px;
    }

    .save-source-btn:hover {
      background: #138d75;
    }

    .mini-status {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      color: #2c3e50;
      background: #ecf9f6;
      border: 1px solid #cdeee6;
      border-radius: 6px;
      padding: 8px;
    }

    @keyframes dots {

      0%,
      20% {
        content: '.';
      }

      40% {
        content: '..';
      }

      60% {
        content: '...';
      }

      80%,
      100% {
        content: '';
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h2 id="title">SRT Fact-Check AI</h2>
    <span id="cache-badge" class="badge badge-cached" style="display: none;">Cached</span>
  </div>

  <textarea id="detected-text" class="content-box" style="min-height: 120px; height: 120px;">
    Detecting content...
  </textarea>
  <div style="display: flex; justify-content: flex-end; margin-top: -10px; margin-bottom: 10px;">
    <button id="retry-btn" class="retry-btn" style="width: auto;">Retry Detection</button>
  </div>

  <div style="margin-bottom:10px;">
    <button id="check-btn" disabled>Fact Check Claim</button>
  </div>

  <div id="loading" class="loading">
    Analyzing claim<span class="loading-dots"></span>
  </div>

  <div id="extracted-claim-box"
    style="display:none; font-size:12px; color:#888; margin-bottom:8px; background:#f5f5f5; border-radius:6px; padding:8px;">
    <strong>Possible Claims Identified:</strong>
    <div id="extracted-claim-text"></div>
  </div>

  <div id="result"></div>
  <button id="copy-btn" class="copy-btn">Copy Report</button>

  <div id="evidence-section" style="display:none; margin-top:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <strong style="font-size:13px;">Evidence Links</strong>
      <button id="copy-links-btn" class="retry-btn" style="width:auto; font-size:11px; padding:4px 10px;">Copy All
        Links</button>
    </div>
    <div id="evidence-links"></div>
    <div id="save-review-status" class="mini-status"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
